name: Sync Tushare Docs

on:
  # 每周一 UTC 02:00 自动运行（北京时间周一 10:00）
  schedule:
    - cron: '0 2 * * 1'

  # 支持手动触发
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只检测变更，不写入文件'
        required: false
        type: boolean
        default: false
      max_docs:
        description: '最大爬取数量（0=全部，用于测试）'
        required: false
        type: number
        default: 0
      doc_id:
        description: '指定单个 doc_id（留空=全部）'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install playwright beautifulsoup4 markdownify

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run Tushare doc crawler
        id: crawler
        env:
          TUSHARE_ACCOUNT: ${{ secrets.TUSHARE_ACCOUNT }}
          TUSHARE_PASSWORD: ${{ secrets.TUSHARE_PASSWORD }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.max_docs }}" ] && [ "${{ inputs.max_docs }}" != "0" ]; then
            ARGS="$ARGS --max-docs ${{ inputs.max_docs }}"
          fi
          if [ -n "${{ inputs.doc_id }}" ]; then
            ARGS="$ARGS --doc-id ${{ inputs.doc_id }}"
          fi

          echo "Running: python scripts/crawl_docs.py --verbose $ARGS"
          python scripts/crawl_docs.py --verbose $ARGS

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No documentation changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Documentation changes detected:"
            git diff --stat
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-sync Tushare API documentation"
          title: "Auto-sync: Tushare API documentation updates"
          body: |
            ## Tushare API 文档自动同步

            This PR is auto-generated by [sync-docs.yml](.github/workflows/sync-docs.yml).

            ### Changes
            - Updated API documentation from [Tushare official docs](https://tushare.pro/document/2)
            - Synced `reference/接口文档/` markdown files
            - Updated `reference/all_links.json` index
            - Regenerated `reference/README.md`

            ---
            *Please review the changes before merging.*
          branch: docs/auto-sync-tushare
          base: master
          labels: |
            documentation
            automated
          delete-branch: true

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Documentation changes detected and PR created/updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No documentation changes - all docs are up to date" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Sync time**: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')" >> $GITHUB_STEP_SUMMARY
